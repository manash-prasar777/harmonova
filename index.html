<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarmoNova 🎵</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #060612;
  --lane-bg: #0a0a1a;
  --gold: #ffd700;
  --cyan: #00f5ff;
  --pink: #ff2d78;
  --green: #39ff14;
  --purple: #b44fff;
  --hit-zone-y: 80px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: linear-gradient(90deg, #0d0d2b, #1a0a30);
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 1.4em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}
.score-row {
  display: flex;
  gap: 20px;
  align-items: center;
}
.score-box {
  text-align: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid #333;
  border-radius: 8px;
  padding: 4px 14px;
  min-width: 60px;
}
.score-box .sv { font-family: 'Orbitron', monospace; font-size: 1.2em; color: var(--gold); font-weight: 700; }
.score-box .sl { font-size: 0.65em; color: #666; letter-spacing: 1px; }

/* ── SONG SELECTOR ── */
.song-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 20px;
  background: #0a0a1a;
  border-bottom: 1px solid #1a1a3a;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.song-bar label { color: #888; font-size: 0.85em; letter-spacing: 1px; }
.song-select {
  background: #12122a;
  color: var(--cyan);
  border: 1px solid #2a2a5a;
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.95em;
  outline: none;
  cursor: pointer;
}
.speed-wrap { display:flex; align-items:center; gap:8px; margin-left: auto; }
.speed-wrap label { color:#666; font-size:0.8em; }
.speed-wrap input[type=range] { accent-color: var(--cyan); width: 80px; }
#speed-lbl { color: var(--cyan); font-size:0.85em; width:28px; }

.btn {
  padding: 6px 18px;
  border-radius: 20px;
  border: none;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 0.95em;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}
.btn:hover { transform: scale(1.05); }
.btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-play { background: linear-gradient(135deg, #00c853, #39ff14); color:#000; }
.btn-stop { background: linear-gradient(135deg, #ff2d78, #ff6600); color:#fff; }
.btn-free { background: rgba(255,255,255,0.08); color:#aaa; border:1px solid #333; }

/* ── STATUS ── */
.status-bar {
  text-align: center;
  font-size: 0.82em;
  color: var(--gold);
  padding: 3px 20px;
  background: rgba(255,215,0,0.04);
  flex-shrink: 0;
  min-height: 22px;
  letter-spacing: 0.5px;
}

/* ── GAME AREA ── */
.game-area {
  flex: 1;
  display: flex;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

/* LANES */
#lanes-container {
  display: flex;
  flex: 1;
  position: relative;
  overflow: hidden;
}

.lane {
  flex: 1;
  position: relative;
  border-right: 1px solid rgba(255,255,255,0.04);
  background: repeating-linear-gradient(
    180deg,
    transparent 0px,
    transparent 39px,
    rgba(255,255,255,0.015) 40px
  );
}
.lane:last-child { border-right: none; }

/* Lane header (note label at top) */
.lane-header {
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Orbitron', monospace;
  font-size: 0.7em;
  font-weight: 700;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  z-index: 2;
  pointer-events: none;
  white-space: nowrap;
}

/* HIT ZONE line */
.hit-line {
  position: absolute;
  left: 0; right: 0;
  bottom: var(--hit-zone-y);
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
  z-index: 5;
  pointer-events: none;
}
.hit-line::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: -6px; bottom: -6px;
  background: linear-gradient(180deg, transparent, rgba(255,215,0,0.06), transparent);
}

/* FALLING NOTES */
.falling-note {
  position: absolute;
  left: 8%;
  width: 84%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 0.72em;
  font-weight: 700;
  color: #000;
  z-index: 10;
  pointer-events: none;
  transition: box-shadow 0.05s;
  box-shadow: 0 0 12px currentColor;
  letter-spacing: 0.5px;
}

/* HIT FLASH overlay per lane */
.lane-flash {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.05s;
  z-index: 3;
}

/* ── KEYBOARD ── */
.keyboard-section {
  flex-shrink: 0;
  background: #0a0a18;
  border-top: 2px solid #1a1a3a;
  overflow-x: auto;
  padding: 8px 0 6px;
}
.keyboard-wrap {
  display: flex;
  justify-content: center;
  min-width: 600px;
  position: relative;
  height: 110px;
  margin: 0 auto;
  width: fit-content;
}

.piano-key {
  position: absolute;
  bottom: 0;
  border-radius: 0 0 8px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 6px;
  user-select: none;
  transition: background 0.06s, transform 0.06s, box-shadow 0.06s;
  -webkit-tap-highlight-color: transparent;
}

.piano-key.white-key {
  width: 46px;
  height: 110px;
  background: linear-gradient(180deg, #ddd8c4 0%, #f5efe0 50%, #e8dfc8 100%);
  border: 1px solid #bbb;
  z-index: 1;
  border-bottom: 3px solid #999;
}
.piano-key.black-key {
  width: 30px;
  height: 68px;
  background: linear-gradient(180deg, #1a1a1a 0%, #333 60%, #111 100%);
  border: 1px solid #000;
  z-index: 2;
  border-bottom: 3px solid #000;
}

.piano-key.white-key .k-sargam { font-size: 0.62em; color: #444; font-weight: 700; font-family:'Rajdhani',sans-serif; line-height:1; }
.piano-key.white-key .k-key   { font-size: 0.56em; color: #888; font-family:'Rajdhani',sans-serif; }
.piano-key.black-key .k-sargam { font-size: 0.55em; color: #ccc; font-weight: 700; font-family:'Rajdhani',sans-serif; line-height:1; }
.piano-key.black-key .k-key   { font-size: 0.5em;  color: #666; font-family:'Rajdhani',sans-serif; }

.piano-key.white-key:active,
.piano-key.white-key.pressed {
  background: linear-gradient(180deg, var(--gold), #ffcc00) !important;
  transform: translateY(2px);
  box-shadow: 0 2px 0 #cc9900 !important;
}
.piano-key.black-key:active,
.piano-key.black-key.pressed {
  background: linear-gradient(180deg, #443300, #665500) !important;
  transform: translateY(2px);
}

/* KEY HIGHLIGHT (when note is active) */
.piano-key.lit-up.white-key {
  background: linear-gradient(180deg, var(--cyan), #0099cc) !important;
  box-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.3) !important;
}
.piano-key.lit-up.black-key {
  background: linear-gradient(180deg, #005566, var(--cyan)) !important;
  box-shadow: 0 0 16px var(--cyan) !important;
}

/* COMBO DISPLAY */
#combo-display {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-family: 'Orbitron', monospace;
  font-size: 3em;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 100;
}

/* MISS INDICATOR */
.miss-pop {
  position: absolute;
  font-family: 'Orbitron', monospace;
  font-size: 1.2em;
  color: var(--pink);
  font-weight: 700;
  pointer-events: none;
  animation: missAnim 0.6s ease-out forwards;
  z-index: 50;
  text-shadow: 0 0 10px var(--pink);
}
@keyframes missAnim {
  0%   { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-40px) scale(0.7); }
}
</style>
</head>

// ══════════════════════════════════════════════════
//  HARMONIUM NOTES & KEYBOARD LAYOUT
// ══════════════════════════════════════════════════
// Sa=C4(60), Re=D4(62), Ga=E4(64), Ma=F4(65), Pa=G4(67),
// Dha=A4(69), Ni=B4(71), Sa'=C5(72)
// Komal: re=C#4(61), ga=Eb4(63), ma=F#4(66), dha=Ab4(68), ni=Bb4(70)

const SARGAM_MIDI = {
  'Sa':60, 're':61, 'Re':62, 'ga':63, 'Ga':64, 'Ma':65, 'ma':66,
  'Pa':67, 'dha':68, 'Dha':69, 'ni':70, 'Ni':71, "Sa'":72,
  "re'":73, "Re'":74, "ga'":75
};

const SARGAM_COLOR = {
  'Sa':'#ff4d6d', 're':'#ff7a45', 'Re':'#ffd700', 'ga':'#a8ff3e',
  'Ga':'#00f5ff', 'Ma':'#45b7ff', 'ma':'#b44fff', 'Pa':'#ff69b4',
  'dha':'#ff9f00', 'Dha':'#39ff14', 'ni':'#00e5ff', 'Ni':'#ff2d78',
  "Sa'": '#ff4d6d'
};

const KEYBOARD_LAYOUT = [
  {midi:60, white:true,  sargam:'Sa',  key:'a'},
  {midi:61, white:false, sargam:'re',  key:'w'},
  {midi:62, white:true,  sargam:'Re',  key:'s'},
  {midi:63, white:false, sargam:'ga',  key:'e'},
  {midi:64, white:true,  sargam:'Ga',  key:'d'},
  {midi:65, white:true,  sargam:'Ma',  key:'f'},
  {midi:66, white:false, sargam:'ma',  key:'t'},
  {midi:67, white:true,  sargam:'Pa',  key:'g'},
  {midi:68, white:false, sargam:'dha', key:'y'},
  {midi:69, white:true,  sargam:'Dha', key:'h'},
  {midi:70, white:false, sargam:'ni',  key:'u'},
  {midi:71, white:true,  sargam:'Ni',  key:'j'},
  {midi:72, white:true,  sargam:"Sa'", key:'k'},
  {midi:73, white:false, sargam:"re'", key:'o'},
  {midi:74, white:true,  sargam:"Re'", key:'l'},
];

const KEY_TO_MIDI = {};
KEYBOARD_LAYOUT.forEach(k => KEY_TO_MIDI[k.key] = k.midi);
const MIDI_TO_KEY = {};
KEYBOARD_LAYOUT.forEach(k => MIDI_TO_KEY[k.midi] = k.key);

// Get unique MIDI notes used in songs
function getUsedNotes(notes) {
  const seen = new Set();
  const result = [];
  notes.forEach(n => {
    const m = SARGAM_MIDI[n.n];
    if (m !== undefined && !seen.has(m)) { seen.add(m); result.push({sargam: n.n, midi: m}); }
  });
  return result;
}

// ══════════════════════════════════════════════════
//  AUDIO ENGINE (WebAudio — harmonium timbre)
// ══════════════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
const activeNodes = {};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);
}

function noteOn(midi) {
  initAudio();
  if (activeNodes[midi]) noteOff(midi);
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  // Harmonium timbre: fundamental + harmonics
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const osc3 = audioCtx.createOscillator();
  osc1.type = 'sawtooth'; osc1.frequency.value = freq;
  osc2.type = 'square';   osc2.frequency.value = freq * 2; 
  osc3.type = 'sine';     osc3.frequency.value = freq * 0.5;

  const g1 = audioCtx.createGain(); g1.gain.value = 0.5;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.15;
  const g3 = audioCtx.createGain(); g3.gain.value = 0.2;
  const mainGain = audioCtx.createGain();

  // Soft attack (bellows feel)
  mainGain.gain.setValueAtTime(0, audioCtx.currentTime);
  mainGain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 0.08);

  // Low-pass filter for warm harmonium tone
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 2200; filter.Q.value = 0.8;

  osc1.connect(g1); osc2.connect(g2); osc3.connect(g3);
  g1.connect(filter); g2.connect(filter); g3.connect(filter);
  filter.connect(mainGain);
  mainGain.connect(masterGain);

  osc1.start(); osc2.start(); osc3.start();
  activeNodes[midi] = { oscs:[osc1,osc2,osc3], gain: mainGain };

  const keyEl = document.getElementById('pkey-'+midi);
  if (keyEl) keyEl.classList.add('pressed','lit-up');
}

function noteOff(midi) {
  const node = activeNodes[midi];
  if (!node) return;
  const t = audioCtx ? audioCtx.currentTime : 0;
  node.gain.gain.linearRampToValueAtTime(0, t + 0.25);
  setTimeout(() => { node.oscs.forEach(o => { try{o.stop();}catch(e){} }); }, 300);
  delete activeNodes[midi];
  const keyEl = document.getElementById('pkey-'+midi);
  if (keyEl) keyEl.classList.remove('pressed','lit-up');
}

// ══════════════════════════════════════════════════
//  KEYBOARD UI BUILD
// ══════════════════════════════════════════════════
function buildKeyboard() {
  const wrap = document.getElementById('keyboard-wrap');
  wrap.innerHTML = '';
  let whiteCount = 0;
  const W = 48, BW = 30;

  // First pass: count whites
  KEYBOARD_LAYOUT.forEach(k => { if (k.white) whiteCount++; });
  wrap.style.width = (whiteCount * W + 4) + 'px';

  let wIdx = 0;
  KEYBOARD_LAYOUT.forEach((k) => {
    const el = document.createElement('div');
    el.className = 'piano-key ' + (k.white ? 'white-key' : 'black-key');
    el.id = 'pkey-' + k.midi;
    el.dataset.midi = k.midi;
    el.innerHTML = `<span class="k-sargam">${k.sargam}</span><span class="k-key">${k.key.toUpperCase()}</span>`;

    if (k.white) {
      el.style.left = (wIdx * W) + 'px';
      wIdx++;
    } else {
      el.style.left = (wIdx * W - BW/2 - 2) + 'px';
    }

    el.addEventListener('mousedown', (e) => { e.preventDefault(); noteOn(k.midi); });
    el.addEventListener('mouseup',   () => noteOff(k.midi));
    el.addEventListener('mouseleave',() => { if(activeNodes[k.midi]) noteOff(k.midi); });
    el.addEventListener('touchstart', (e) => { e.preventDefault(); noteOn(k.midi); }, {passive:false});
    el.addEventListener('touchend',   (e) => { e.preventDefault(); noteOff(k.midi); }, {passive:false});
    wrap.appendChild(el);
  });
}

// ══════════════════════════════════════════════════
//  LANES — one per note used in selected song
// ══════════════════════════════════════════════════
let laneNotes = []; // [{sargam, midi}]
let laneMap = {};   // midi → lane index

function buildLanes(notes) {
  // Get all unique notes in order of pitch
  const usedMidis = [...new Set(notes.map(n => SARGAM_MIDI[n.n]).filter(Boolean))];
  usedMidis.sort((a,b) => a-b);
  laneNotes = usedMidis.map(m => {
    const k = KEYBOARD_LAYOUT.find(k => k.midi === m);
    const sargam = Object.entries(SARGAM_MIDI).find(([s,v])=>v===m)?.[0] || '?';
    return { sargam, midi: m };
  });
  laneMap = {};
  laneNotes.forEach((ln, i) => { laneMap[ln.midi] = i; });

  const container = document.getElementById('lanes-container');
  container.innerHTML = '';
  laneNotes.forEach((ln, i) => {
    const lane = document.createElement('div');
    lane.className = 'lane';
    lane.id = 'lane-' + i;

    const header = document.createElement('div');
    header.className = 'lane-header';
    header.textContent = ln.sargam;
    header.style.color = (SARGAM_COLOR[ln.sargam] || '#fff') + '55';
    lane.appendChild(header);

    const flash = document.createElement('div');
    flash.className = 'lane-flash';
    flash.id = 'flash-' + i;
    flash.style.background = `radial-gradient(ellipse at center bottom, ${SARGAM_COLOR[ln.sargam] || '#fff'}22, transparent 70%)`;
    lane.appendChild(flash);

    container.appendChild(lane);
  });
}

// ══════════════════════════════════════════════════
//  GAME ENGINE — falling notes
// ══════════════════════════════════════════════════
let gameRunning = false;
let currentSongNotes = [];
let noteIndex = 0;
let activeNote = null;     // {sargam, midi, el, laneIdx, startTime, duration, hit}
let scheduledEl = null;
let gameRAF = null;
let score = 0, hits = 0, misses = 0, combo = 0;
let gameStartTime = 0;
let noteTimes = [];        // [{midi, absStart, duration, index}] — precomputed
let spawnedIndex = 0;
let fallingNotes = [];     // DOM elements currently falling

const NOTE_HEIGHT = 36;
const NOTE_SPAWN_AHEAD = 2200; // ms ahead to spawn
const HIT_ZONE_BOTTOM = 80;    // px from bottom (CSS var)
const HIT_WINDOW = 260;        // ms tolerance

function precomputeTimes(notes, speed) {
  let t = 500; // initial delay ms
  return notes.map((n, i) => {
    const obj = { midi: SARGAM_MIDI[n.n], sargam: n.n, absStart: t, duration: n.d / speed, index: i };
    t += (n.d / speed) + 120;
    return obj;
  });
}

function startGame() {
  initAudio();
  stopGame(false);
  resetScore();

  const songName = document.getElementById('song-select').value;
  const raw = SONGS[songName];
  if (!raw) return;
  currentSongNotes = raw;

  const speed = parseFloat(document.getElementById('speed-slider').value);
  buildLanes(raw);

  noteTimes = precomputeTimes(raw, speed);
  spawnedIndex = 0;
  fallingNotes = [];
  gameRunning = true;
  gameStartTime = performance.now();

  document.getElementById('btn-play').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  setStatus(`🎵 ${songName} — keyboard dabao!`);

  gameLoop();
}

function gameLoop() {
  if (!gameRunning) return;
  const now = performance.now() - gameStartTime;
  const gameAreaH = document.getElementById('game-area').clientHeight;

  // Spawn notes that should be visible
  while (spawnedIndex < noteTimes.length) {
    const nt = noteTimes[spawnedIndex];
    const arriveTime = nt.absStart;
    const travelTime = getTravelTime();
    const spawnTime = arriveTime - travelTime;
    if (now >= spawnTime) {
      spawnNote(nt, gameAreaH, now);
      spawnedIndex++;
    } else break;
  }

  // Animate falling notes
  const toRemove = [];
  fallingNotes.forEach(fn => {
    const elapsed = now - fn.spawnTime;
    const travelTime = getTravelTime();
    const progress = elapsed / travelTime; // 0 → 1 when at hit zone
    // Bottom of travel = HIT_ZONE_BOTTOM px from bottom of gameArea
    const startY = -NOTE_HEIGHT;
    const endY = gameAreaH - HIT_ZONE_BOTTOM - NOTE_HEIGHT/2;
    const y = startY + progress * (endY - startY);
    fn.el.style.top = y + 'px';

    // Missed?
    if (!fn.hit && now > fn.nt.absStart + HIT_WINDOW) {
      fn.el.style.opacity = '0.3';
    }
    if (y > gameAreaH + 20) {
      if (!fn.hit) {
        misses++; combo = 0;
        showMiss(fn.laneIdx, gameAreaH);
        updateScoreUI();
      }
      fn.el.remove();
      toRemove.push(fn);
    }
  });
  fallingNotes = fallingNotes.filter(f => !toRemove.includes(f));

  // End check
  if (spawnedIndex >= noteTimes.length && fallingNotes.length === 0) {
    endGame(); return;
  }

  gameRAF = requestAnimationFrame(gameLoop);
}

function getTravelTime() {
  const speed = parseFloat(document.getElementById('speed-slider').value);
  return 2000 / speed;
}

function spawnNote(nt, gameAreaH, nowMs) {
  if (!(nt.midi in laneMap)) return;
  const laneIdx = laneMap[nt.midi];
  const lane = document.getElementById('lane-' + laneIdx);
  if (!lane) return;

  const el = document.createElement('div');
  el.className = 'falling-note';
  el.textContent = nt.sargam;
  const col = SARGAM_COLOR[nt.sargam] || '#fff';
  el.style.background = col;
  el.style.height = NOTE_HEIGHT + 'px';
  el.style.color = '#000';
  el.style.boxShadow = `0 0 18px ${col}, 0 0 6px ${col}`;
  el.style.top = (-NOTE_HEIGHT) + 'px';
  lane.appendChild(el);

  fallingNotes.push({ el, nt, laneIdx, spawnTime: nowMs - (nt.absStart - (nt.absStart - getTravelTime() > 0 ? nt.absStart - getTravelTime() : 0)), hit: false });
  // Corrected spawnTime:
  const last = fallingNotes[fallingNotes.length-1];
  last.spawnTime = nowMs;
}

function checkHit(pressedMidi) {
  if (!gameRunning) return false;
  const now = performance.now() - gameStartTime;
  // Find the closest unHit note for this midi within window
  let best = null, bestDiff = Infinity;
  fallingNotes.forEach(fn => {
    if (fn.hit) return;
    if (fn.nt.midi !== pressedMidi) return;
    const diff = Math.abs(now - fn.nt.absStart);
    if (diff < HIT_WINDOW && diff < bestDiff) { best = fn; bestDiff = diff; }
  });
  if (best) {
    best.hit = true;
    hits++; combo++;
    score += 10 + combo * 2;
    updateScoreUI();
    flashLane(best.laneIdx);
    showCombo(combo);
    // Make note flash green
    best.el.style.background = '#39ff14';
    best.el.style.boxShadow = '0 0 30px #39ff14';
    setTimeout(() => { best.el.style.opacity = '0'; }, 150);
    return true;
  }
  return false;
}

function flashLane(idx) {
  const f = document.getElementById('flash-' + idx);
  if (!f) return;
  f.style.opacity = '1';
  setTimeout(() => { f.style.opacity = '0'; }, 180);
}

function showCombo(c) {
  if (c < 3) return;
  const el = document.getElementById('combo-display');
  el.textContent = c + 'x 🔥';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 700);
}

function showMiss(laneIdx, gameAreaH) {
  const lane = document.getElementById('lane-' + laneIdx);
  if (!lane) return;
  const pop = document.createElement('div');
  pop.className = 'miss-pop';
  pop.textContent = 'MISS';
  pop.style.bottom = (HIT_ZONE_BOTTOM + 10) + 'px';
  pop.style.left = '50%';
  pop.style.transform = 'translateX(-50%)';
  lane.appendChild(pop);
  setTimeout(() => pop.remove(), 700);
}

function stopGame(updateUI = true) {
  gameRunning = false;
  cancelAnimationFrame(gameRAF);
  // Remove all falling notes
  document.querySelectorAll('.falling-note').forEach(e => e.remove());
  fallingNotes = [];
  // Stop all sounds
  Object.keys(activeNodes).forEach(m => noteOff(parseInt(m)));
  if (updateUI) {
    document.getElementById('btn-play').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    setStatus('Ruk gaya. Dobara PLAY dabaao.');
  }
}

function endGame() {
  gameRunning = false;
  const acc = (hits + misses) > 0 ? Math.round(hits/(hits+misses)*100) : 0;
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  setStatus(`🎉 Song khatam! Score: ${score} | Accuracy: ${acc}% | Max Combo: ${combo} 🔥`);
}

function freePlay() {
  stopGame();
  // Rebuild lanes for selected song for keyboard feel
  const songName = document.getElementById('song-select').value;
  const raw = SONGS[songName];
  if (raw) buildLanes(raw);
  setStatus('🎹 Free Play — keyboard bajao maazaa karo!');
}

function resetScore() {
  score = hits = misses = combo = 0;
  updateScoreUI();
}

function updateScoreUI() {
  document.getElementById('sv-score').textContent = score;
  document.getElementById('sv-hits').textContent = hits;
  document.getElementById('sv-miss').textContent = misses;
  document.getElementById('sv-combo').textContent = combo;
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ══════════════════════════════════════════════════
//  KEYBOARD EVENTS
// ══════════════════════════════════════════════════
const heldKeys = new Set();

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const key = e.key.toLowerCase();
  if (KEY_TO_MIDI[key] === undefined) return;
  const midi = KEY_TO_MIDI[key];
  heldKeys.add(key);
  noteOn(midi);
  if (!checkHit(midi)) {
    // Wrong note or missed timing — visual only, no penalty
  }
});

document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();
  if (KEY_TO_MIDI[key] === undefined) return;
  heldKeys.delete(key);
  noteOff(KEY_TO_MIDI[key]);
});

// ══════════════════════════════════════════════════
//  SONG SELECT POPULATE
// ══════════════════════════════════════════════════
function populateSongs() {
  const sel = document.getElementById('song-select');
  Object.keys(SONGS).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
}

function onSongChange() {
  stopGame();
  const songName = document.getElementById('song-select').value;
  const raw = SONGS[songName];
  if (raw) buildLanes(raw);
  setStatus(`"${songName}" ready — PLAY dabaao!`);
}

function onSpeedChange() {
  const v = document.getElementById('speed-slider').value;
  document.getElementById('speed-lbl').textContent = v + 'x';
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  populateSongs();
  buildKeyboard();
  onSongChange(); // build lanes for first song
});
</script>
